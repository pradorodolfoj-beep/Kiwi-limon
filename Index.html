<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiwi Limón - Menú Digital</title>
    <style>
        :root { 
            --primary-green: #4CAF50; 
            --light-green: #8BC34A; 
            --dark-bg: #121212; 
            --card-bg: #1e1e1e; 
            --text-light: #ffffff; 
            --text-dark: #b3b3b3; 
        }
        body { 
            background-color: var(--dark-bg); 
            color: var(--text-light); 
            font-family: sans-serif; 
            margin: 0; 
            padding: 0; 
        }
        
        /* Contenedor del Menú Principal */
        #menu-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            padding: 12px; 
            max-width: 600px; 
            margin: 0 auto; 
        }
        
        /* Tarjetas de Productos */
        .product-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3); 
            border: 1px solid #2a2a2a; 
        }
        .product-card-top { 
            height: 100px; 
            background: #252525; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 2.2rem; 
        }
        .product-card-bottom { 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            gap: 4px; 
            flex-grow: 1; 
        }
        .product-title { 
            font-size: 0.9rem; 
            font-weight: 700; 
            margin: 0; 
        }
        .product-description { 
            font-size: 0.72rem; 
            color: var(--text-dark); 
            margin-bottom: 6px; 
            display: -webkit-box; 
            -webkit-line-clamp: 3; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
        }
        .product-footer { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-top: auto; 
        }
        .product-price { 
            font-weight: bold; 
            color: var(--light-green); 
            font-size: 0.9rem; 
        }
        .btn-order { 
            background-color: var(--primary-green); 
            color: white; 
            border: none; 
            padding: 6px 10px; 
            border-radius: 6px; 
            font-size: 0.75rem; 
            font-weight: bold; 
            cursor: pointer; 
        }
        
        /* Estilos del Panel Admin Organizado */
        #admin-view { 
            display: none; 
            padding: 15px; 
            max-width: 600px; 
            margin: 0 auto; 
        }
        .admin-form-group {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }
        .admin-form-group input, .admin-form-group textarea {
            width: 100%; 
            padding: 12px; 
            background: #252525; 
            border: 1px solid #333; 
            color: white; 
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.9rem;
        }
        
        /* Tablas */
        table { 
            width: 100%; 
            margin-top: 25px; 
            border-collapse: collapse; 
        }
        th, td { 
            padding: 10px; 
            text-align: left; 
            border-bottom: 1px solid #2a2a2a; 
        }

        /* Carrito Drawer */
        #cart-drawer { 
            position: fixed; 
            top: 0; 
            right: -100%; 
            width: 85%; 
            max-width: 400px; 
            height: 100vh; 
            background: #1e1e1e; 
            z-index: 9999; 
            transition: right 0.3s ease; 
            padding: 20px; 
            box-shadow: -5px 0 15px rgba(0,0,0,0.5); 
            overflow-y: auto; 
            box-sizing: border-box;
        }
        #cart-drawer.open { right: 0; }
        #overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            background: rgba(0, 0, 0, 0.7); 
            z-index: 9998; 
        }
    </style>
</head>
<body>
    <div id="overlay"></div>
    
    <header style="padding: 15px 12px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a2a;">
        <div style="font-size: 1.15rem; font-weight: 800;">🥝 <span style="color: #8BC34A;">Kiwi</span> <span style="color: #FFEB3B;">Limón</span> 🍋</div>
        <div style="display: flex; gap: 8px;">
            <button id="btn-toggle-view" style="background: #252525; color: #fff; border: 1px solid #333; padding: 7px 12px; border-radius: 20px; font-size: 0.8rem; cursor: pointer;">⚙️ Admin</button>
            <button id="btn-open-cart" style="position: relative; background: #4CAF50; color: white; border: none; padding: 7px 14px; border-radius: 20px; font-size: 0.8rem; cursor: pointer;">🛒 <span id="cart-count">0</span></button>
        </div>
    </header>

    <!-- VISTA CLIENTE -->
    <main id="customer-view">
        <div style="text-align: center; padding: 25px 15px;">
            <h1 style="color: #8BC34A; margin: 0 0 10px 0;">Sabores Frescos</h1>
            <a href="https://www.google.com/maps/search/?api=1&query=Casa+La+Viña+Valencia" target="_blank" style="text-decoration: none; color: #5c6bc0; font-weight: bold; border: 1px solid #2a2a2a; padding: 6px 16px; border-radius: 20px;">📍 Casa La Viña, Valencia</a>
        </div>
        <div id="menu-container"></div>
    </main>

    <!-- VISTA ADMINISTRADOR -->
    <div id="admin-view">
        <h2 style="color: #8BC34A; margin-bottom: 20px;">🛠️ Panel de Inventario</h2>
        <form id="product-form">
            <input type="hidden" id="edit-id">
            <div class="admin-form-group">
                <input type="text" id="prod-name" placeholder="Nombre del producto" required>
            </div>
            <div class="admin-form-group">
                <textarea id="prod-desc" rows="2" placeholder="Descripción de los ingredientes" required></textarea>
            </div>
            <div class="admin-form-group">
                <input type="number" id="prod-price" step="0.01" placeholder="Precio ($)" required>
            </div>
            <div class="admin-form-group">
                <input type="text" id="prod-emoji" placeholder="Emoji representativo (Ej: 🍓, 🥝, 🍦)" required>
            </div>
            <button type="submit" style="width: 100%; padding: 12px; background: var(--primary-green); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 5px;">Guardar Producto</button>
            <button type="button" id="btn-cancel-edit" style="display: none; width: 100%; padding: 12px; background: #444; color: white; border: none; border-radius: 6px; font-weight: bold; margin-top: 8px;">Cancelar Edición</button>
        </form>

        <table>
            <thead>
                <tr style="border-bottom: 2px solid #333;">
                    <th>Icono</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="admin-table-body"></tbody>
        </table>
        <button id="btn-logout-admin" style="margin-top: 30px; background: #ff4d4d; color: white; padding: 12px; border: none; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer;">Cerrar Sesión Admin</button>
    </div>

    <!-- CARRITO DRAWER -->
    <div id="cart-drawer">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px;">
            <h3 style="margin: 0; font-size: 1.3rem;">🛒 Tu Pedido</h3>
            <button id="btn-close-cart" style="background: #333; color: white; border: none; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; cursor: pointer;">✕</button>
        </div>
        
        <div id="cart-items-container"></div>
        
        <div id="delivery-box" style="display: none; margin-top: 20px; background: #252525; padding: 15px; border-radius: 8px;">
            <p style="margin: 0 0 10px 0; font-weight: bold;">¿Cómo deseas recibir tu pedido?</p>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button id="btn-opt-pickup" style="flex: 1; padding: 10px; background: #333; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">🛍️ Pick Up</button>
                <button id="btn-opt-delivery" style="flex: 1; padding: 10px; background: #333; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">🛵 Delivery</button>
            </div>

            <!-- Formulario Requerido -->
            <div id="customer-data-form" style="display: none; border-top: 1px solid #333; padding-top: 15px; flex-direction: column; gap: 10px;">
                <p style="margin: 0 0 5px 0; font-size: 0.85rem; font-weight: bold; color: #8BC34A;">📝 Datos de Entrega / Facturación:</p>
                <input type="text" id="cust-fullname" placeholder="Nombre y Apellido *" style="width:100%; padding: 10px; background:#1a1a1a; border:1px solid #444; color:white; border-radius:6px; box-sizing:border-box;">
                <input type="text" id="cust-cedula" placeholder="Cédula de Identidad *" style="width:100%; padding: 10px; background:#1a1a1a; border:1px solid #444; color:white; border-radius:6px; box-sizing:border-box;">
                <input type="tel" id="cust-phone" placeholder="Número de Teléfono *" style="width:100%; padding: 10px; background:#1a1a1a; border:1px solid #444; color:white; border-radius:6px; box-sizing:border-box;">
                <input type="text" id="cust-address" placeholder="Dirección corta (Opcional)" style="width:100%; padding: 10px; background:#1a1a1a; border:1px solid #444; color:white; border-radius:6px; box-sizing:border-box;">
            </div>
        </div>

        <div style="margin-top: 30px; border-top: 1px solid #333; padding-top: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <span>Total:</span>
                <span id="cart-total-amount" style="font-size: 1.4rem; font-weight: bold; color: var(--light-green);">$0.00</span>
            </div>
            <button id="btn-checkout" style="width: 100%; background: var(--primary-green); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer;">Proceder a Ordenar</button>
        </div>
    </div>

    <!-- MODAL LOGIN ADMIN -->
    <div id="login-modal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e1e1e; padding: 25px; border-radius: 12px; z-index: 10000; width: 85%; max-width: 340px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); border: 1px solid #333;">
        <h3 style="margin-top: 0; margin-bottom: 15px; text-align: center;">Acceso Administrativo</h3>
        <form id="login-form" style="display: flex; flex-direction: column; gap: 10px;">
            <input type="text" id="login-username" placeholder="Usuario" required style="padding: 10px; background: #252525; border: 1px solid #333; color: white; border-radius: 6px;">
            <input type="password" id="login-password" placeholder="Clave" required style="padding: 10px; background: #252525; border: 1px solid #333; color: white; border-radius: 6px;">
            <button type="submit" style="padding: 12px; background: var(--primary-green); border: none; color: white; border-radius: 6px; font-weight: bold; cursor: pointer;">Ingresar</button>
            <button type="button" id="btn-close-login" style="background: none; color: #bbb; border: none; padding: 5px; cursor: pointer; font-size: 0.85rem;">Cerrar</button>
        </form>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
